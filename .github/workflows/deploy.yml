# .github/workflows/deploy-backend.yml
name: 🚀 Déployer le Backend DIAMBRA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  APP_DIR: "/var/www/diambrabackend"
  PM2_NAME: "diambra-backend"
  BACKEND_PORT: 3001

jobs:
  test-and-build:
    name: 📦 Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🧪 Exécution des tests
        run: npm test --if-present
        continue-on-error: true

      - name: 🔨 Build de production
        run: npm run build

      - name: 🔍 Vérification du build
        run: |
          if [ ! -f "dist/main.js" ]; then
            echo "❌ dist/main.js introuvable"
            ls -la dist/
            exit 1
          fi
          echo "✅ Build valide"

      - name: 💾 Upload des artefacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 1

  deploy:
    name: 🚀 Déploiement sur VPS
    runs-on: ubuntu-latest
    needs: test-and-build
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Téléchargement du build
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./deploy

      - name: 📤 Envoi vers le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/*"
          target: "${{ env.APP_DIR }}"
          strip_components: 1
          overwrite: true

      - name: 🔧 Installation & Redémarrage (Solution Radicale)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "========================================="
            echo "🚀 DÉPLOIEMENT BACKEND DIAMBRA (v2)"
            echo "📅 $(date)"
            echo "========================================="

            cd ${{ env.APP_DIR }}

            # 1. Préparation des dossiers
            mkdir -p /var/www/uploads/books
            mkdir -p /var/www/uploads/temp

            # 2. Installation des dépendances
            echo "📦 Installation des dépendances..."
            npm ci --omit=dev --silent

            # 3. Création du .env (TOUS LES FORMATS POSSIBLES)
            echo "🔐 Création du fichier .env (format universel)..."
            cat > .env << 'ENVEOF'
            # Serveur
            PORT=3001
            NODE_ENV=production
            BASE_URL=https://api.diambra.net
            
            # Sécurité
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            
            # MongoDB - TOUS LES FORMATS POSSIBLES
            DATABASE_URL=mongodb://localhost:27017/diambra
            MONGODB_URI=mongodb://localhost:27017/diambra
            MONGO_URI=mongodb://localhost:27017/diambra
            DB_URI=mongodb://localhost:27017/diambra
            MONGODB_URL=mongodb://localhost:27017/diambra
            
            # DeepSeek
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_TIMEOUT=300000
            DEEPSEEK_MAX_RETRIES=4
            
            # Cache & Uploads
            CACHE_TTL=3600000
            UPLOAD_DIR=/var/www/uploads/books
            PUBLIC_UPLOAD_URL=https://diambra.net/uploads
            ENVEOF

            # 4. Vérification du fichier main.js
            if [ ! -f "dist/main.js" ]; then
              echo "❌ ERREUR: dist/main.js introuvable"
              ls -la dist/ 2>/dev/null
              exit 1
            fi

            # 5. CORRECTION RADICALE : Forcer la variable MongoDB dans le code
            echo "🔧 Application du patch radical..."
            cp dist/main.js dist/main.js.backup
            sed -i 's/process.env.DATABASE_URL/"mongodb:\/\/localhost:27017\/diambra"/g' dist/main.js
            sed -i 's/process.env.MONGODB_URI/"mongodb:\/\/localhost:27017\/diambra"/g' dist/main.js
            sed -i 's/process.env.MONGO_URI/"mongodb:\/\/localhost:27017\/diambra"/g' dist/main.js
            sed -i 's/process.env.DB_URI/"mongodb:\/\/localhost:27017\/diambra"/g' dist/main.js
            
            # 6. Redémarrage avec PM2
            echo "🔄 Redémarrage du backend..."
            pm2 delete ${{ env.PM2_NAME }} 2>/dev/null || true
            pm2 start dist/main.js \
              --name "${{ env.PM2_NAME }}" \
              --time \
              --instances 1 \
              --exp-backoff-restart-delay=100 \
              --node-args="--max-old-space-size=512"
            
            pm2 save
            pm2 list

            # 7. Vérification
            echo "⏳ Vérification du backend..."
            sleep 8

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.BACKEND_PORT }} || echo "000")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "304" ]; then
              echo "✅ Backend OK (HTTP $HTTP_CODE)"
            else
              echo "⚠️ Backend HTTP $HTTP_CODE - Logs:"
              pm2 logs "${{ env.PM2_NAME }}" --lines 30 --nostream
              echo "📄 Contenu réel du .env:"
              cat .env | grep -E "MONGODB|DATABASE|PORT"
              exit 1
            fi

            echo "========================================="
            echo "🎉 Déploiement réussi !"
            echo "🌐 Backend: https://api.diambra.net"
            echo "========================================="